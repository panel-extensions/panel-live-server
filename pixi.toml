[workspace]
name = "panel-live-server"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[tasks]
postinstall = "pip install --no-build-isolation --no-deps --disable-pip-version-check -e ."

[dependencies]
python = ">=3.12"
requests = "*"
pydantic = ">=2.0"
ruff = "*"
typer = "*"
pip = "*"
hatchling = "*"
hatch-vcs = "*"
panel = ">=1.5.0"
setuptools = ">=61"
setuptools-scm = "*"

[pypi-dependencies]
fastmcp = ">=3.0"
panel-material-ui = "*"

[feature.test.dependencies]
pytest = ">=6"
pytest-asyncio = "*"
pytest-cov = "*"
mypy = "*"
[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=panel_live_server --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python-build = "*"
twine = "*"
wheel = "*"
[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[feature.lint.dependencies]
pre-commit = "*"

[feature.lint.tasks]
lint = "pre-commit run --all-files"
lint-install = "pre-commit install"

[feature.py312.dependencies]
python = "3.12.*"

[feature.test-ui]
channels = ["microsoft"]

[feature.test-ui.dependencies]
playwright = { version = "*", channel = "microsoft" }
pytest-playwright = { version = "*", channel = "microsoft" }
pytest-asyncio = "*"
pytest-rerunfailures = "*"
pytest-xdist = "*"
jupyter_server = "*"
esbuild = "*"
packaging = "*"

[feature.test-ui.tasks]
_install-ui = 'playwright install chromium'

[feature.test-ui.tasks.test-ui]
cmd = 'pytest tests/ui --ui --browser chromium -n logical --dist loadgroup --reruns 3 --reruns-delay 10'
depends-on = ["_install-ui"]

[feature.docs.dependencies]
zensical = "*"
mkdocstrings-python = "*"

[feature.docs.tasks]
docs = "zensical serve"
docs-build = "zensical build"

[environments]
default = ["test"]
py312 = ["py312", "test"]
test-ui = ["py312", "test", "test-ui"]
docs = ["docs"]
build = ["build"]
lint = { features = ["lint"], no-default-feature = true }
