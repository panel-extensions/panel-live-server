<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Panel Live Server · show</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .layout {
        display: grid;
        grid-template-rows: auto auto 1fr;
        min-height: 100vh;
        gap: 10px;
        padding: 10px 12px 12px;
        box-sizing: border-box;
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      button,
      a.button {
        border: 1px solid rgba(120, 120, 120, 0.4);
        border-radius: 8px;
        padding: 5px 10px;
        background: transparent;
        color: inherit;
        text-decoration: none;
        cursor: pointer;
        font-size: 0.85rem;
      }

      button:hover,
      a.button:hover {
        background: rgba(120, 120, 120, 0.12);
      }

      button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .message {
        margin: 0;
        font-size: 0.9rem;
        white-space: pre-wrap;
        opacity: 0.9;
        line-height: 1.4;
      }

      .message a {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .message.status-error   { color: #e05252; }
      .message.status-warning { color: #d4860a; }
      .message.status-success { color: inherit; }

      .iframe-wrapper {
        position: relative;
        width: 100%;
        height: calc(100vh - 110px);
        min-height: 360px;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 1px solid rgba(120, 120, 120, 0.4);
        border-radius: 8px;
        background: white;
        display: block;
      }

      /* Loading overlay */
      .loading-overlay {
        position: absolute;
        inset: 0;
        border-radius: 8px;
        background: rgba(128, 128, 128, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 0.85rem;
        opacity: 0.7;
        pointer-events: none;
      }

      .loading-overlay.hidden { display: none; }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(120, 120, 120, 0.3);
        border-top-color: rgba(120, 120, 120, 0.8);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="actions">
        <button id="copy-code" type="button" disabled>Copy Code</button>
        <button id="copy-link" type="button">Copy URL</button>
        <a id="open-link" class="button" href="#" target="_blank" rel="noopener" style="display:none">Open ↗</a>
      </div>
      <p id="message" class="message">Awaiting tool result…</p>
      <div class="iframe-wrapper">
        <div id="loading-overlay" class="loading-overlay">
          <div class="spinner"></div>
          <span>Loading visualization…</span>
        </div>
        <iframe id="view" src="about:blank" title="show preview"></iframe>
      </div>
    </div>

    <script type="module">
      import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

      const messageEl = document.getElementById("message");
      const iframe = document.getElementById("view");
      const loadingOverlay = document.getElementById("loading-overlay");
      const copyCodeButton = document.getElementById("copy-code");
      const copyLinkButton = document.getElementById("copy-link");
      const openLink = document.getElementById("open-link");

      let currentUrl = "";
      let currentCode = "";

      // Show loading overlay when iframe starts loading a real URL
      iframe.addEventListener("load", () => {
        if (iframe.src && iframe.src !== "about:blank") {
          loadingOverlay.classList.add("hidden");
        }
      });

      copyCodeButton.addEventListener("click", async () => {
        if (!navigator.clipboard) return;
        await navigator.clipboard.writeText(currentCode || "No code available.");
      });

      copyLinkButton.addEventListener("click", async () => {
        if (!currentUrl || !navigator.clipboard) return;
        await navigator.clipboard.writeText(currentUrl);
      });

      const app = new App({ name: "panel-live-server-show", version: "0.1.0" });

      app.ontoolresult = ({ content }) => {
        const textContent = content?.find((entry) => entry.type === "text");
        const rawText = textContent?.text ?? "No tool text payload received.";

        let parsedPayload = null;
        try {
          parsedPayload = JSON.parse(rawText);
        } catch {
          parsedPayload = null;
        }

        // Reset status classes
        messageEl.className = "message";

        if (parsedPayload && typeof parsedPayload === "object") {
          const status = parsedPayload.status || "success";
          const statusPrefix = status === "error" ? "✗ " : status === "warning" ? "⚠ " : "";
          const baseMessage = statusPrefix + (parsedPayload.message || "Tool result received.");
          const extraError = parsedPayload.error_message ? `\n\n${parsedPayload.error_message}` : "";
          const recovery = parsedPayload.recovery ? `\n\n${parsedPayload.recovery}` : "";

          messageEl.classList.add(`status-${status}`);
          currentUrl = typeof parsedPayload.url === "string" ? parsedPayload.url : "";
          currentCode = typeof parsedPayload.code === "string" ? parsedPayload.code : "";

          // Update tab title with visualization name if available
          if (parsedPayload.name) {
            document.title = `Panel Live Server · ${parsedPayload.name}`;
          }

          // Enable Copy Code button now that we have a result
          copyCodeButton.disabled = !currentCode;

          // Build message with optional clickable URL
          if (currentUrl) {
            messageEl.innerHTML = "";
            const textNode = document.createTextNode(`${baseMessage}${extraError}${recovery} `);
            messageEl.appendChild(textNode);
            const link = document.createElement("a");
            link.href = currentUrl;
            link.target = "_blank";
            link.rel = "noopener";
            link.textContent = "Open ↗";
            messageEl.appendChild(link);
          } else {
            messageEl.textContent = `${baseMessage}${extraError}${recovery}`;
          }
        } else {
          messageEl.textContent = rawText;
          const urlRegex = /(https?:\/\/[^\s)]+)/i;
          const match = rawText.match(urlRegex);
          currentUrl = match ? match[1] : "";
          currentCode = "";
        }

        // Update Open button visibility
        if (currentUrl) {
          openLink.href = currentUrl;
          openLink.style.display = "";
        } else {
          openLink.style.display = "none";
        }

        // Load iframe (show loading overlay)
        if (currentUrl) {
          loadingOverlay.classList.remove("hidden");
          iframe.src = currentUrl;
        } else {
          loadingOverlay.classList.add("hidden");
          iframe.src = "about:blank";
        }
      };

      await app.connect();
    </script>
  </body>
</html>
