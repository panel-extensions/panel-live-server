<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Panel Live Server · show</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow-x: hidden;
      }

      .layout {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
        gap: 6px;
        padding: 6px 8px 8px;
        box-sizing: border-box;
      }

      .toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: nowrap;
        min-height: 28px;
      }

      .toolbar-sep {
        width: 1px;
        height: 16px;
        background: rgba(120, 120, 120, 0.3);
        flex-shrink: 0;
      }

      .message {
        flex: 1;
        min-width: 0;
        margin: 0;
        font-size: 0.8rem;
        opacity: 0.75;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1;
      }

      .message.status-error {
        color: #c0392b;
        opacity: 1;
        font-weight: 600;
      }

      .message.status-warning {
        color: #b85c00;
        opacity: 1;
        font-weight: 600;
      }

      .message.status-error span,
      .message.status-warning span {
        background: rgba(192, 57, 43, 0.1);
        border-radius: 4px;
        padding: 1px 6px;
      }

      .message.status-warning span {
        background: rgba(184, 92, 0, 0.1);
      }

      button, a[role="button"] {
        border: 1px solid rgba(120, 120, 120, 0.4);
        border-radius: 6px;
        padding: 3px 8px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 0.78rem;
        white-space: nowrap;
        flex-shrink: 0;
        text-decoration: none;
        display: inline-block;
        line-height: normal;
        font-family: inherit;
      }

      button:hover, a[role="button"]:not([aria-disabled="true"]):hover {
        background: rgba(120, 120, 120, 0.12);
      }

      button:disabled, a[role="button"][aria-disabled="true"] {
        opacity: 0.35;
        cursor: default;
      }

      button.copied {
        color: #3b9a5f;
        border-color: #3b9a5f;
      }

      button.zoom-active {
        background: rgba(120, 120, 120, 0.18);
        border-color: rgba(120, 120, 120, 0.7);
      }

      .iframe-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 300px;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 1px solid rgba(120, 120, 120, 0.4);
        border-radius: 8px;
        background: white;
        display: block;
        transform-origin: top left;
      }

      /* Loading overlay */
      .loading-overlay {
        position: absolute;
        inset: 0;
        border-radius: 8px;
        background: rgba(128, 128, 128, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 0.85rem;
        opacity: 0.7;
        pointer-events: none;
      }

      .loading-overlay.hidden { display: none; }

      .loading-overlay.blocked {
        flex-direction: column;
        gap: 8px;
        opacity: 1;
        pointer-events: auto;
        background: rgba(128, 128, 128, 0.05);
      }

      .loading-overlay.blocked .spinner { display: none; }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(120, 120, 120, 0.3);
        border-top-color: rgba(120, 120, 120, 0.8);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Error panel — shown instead of iframe when validation fails */
      .error-panel {
        display: none;
        position: absolute;
        inset: 0;
        border: 1px solid rgba(192, 57, 43, 0.3);
        border-radius: 8px;
        background: rgba(192, 57, 43, 0.04);
        padding: 24px;
        overflow: auto;
        box-sizing: border-box;
      }

      .error-panel .error-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #c0392b;
      }

      .error-panel .error-body {
        font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        font-size: 0.82rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        color: inherit;
        opacity: 0.85;
      }

      .error-panel.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="toolbar">
        <button id="share-url" type="button" disabled>Share URL</button>
        <button id="copy-code" type="button" disabled>Copy Code</button>
        <div class="toolbar-sep"></div>
        <p id="message" class="message">Awaiting tool result…</p>
        <div class="toolbar-sep"></div>
        <button id="zoom-100" type="button" class="zoom-active">100%</button>
        <button id="zoom-75"  type="button">75%</button>
        <button id="zoom-50"  type="button">50%</button>
        <button id="zoom-25"  type="button">25%</button>
      </div>
      <div class="iframe-wrapper">
        <div id="loading-overlay" class="loading-overlay">
          <div class="spinner"></div>
          <span>Loading visualization…</span>
        </div>
        <div id="error-panel" class="error-panel">
          <div class="error-header">✗ Validation Error</div>
          <div id="error-body" class="error-body"></div>
        </div>
        <iframe id="view" src="about:blank" title="show preview"></iframe>
      </div>
    </div>

    <script type="module">
      import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

      const messageEl = document.getElementById("message");
      const iframe = document.getElementById("view");
      const loadingOverlay = document.getElementById("loading-overlay");
      const errorPanel = document.getElementById("error-panel");
      const errorBody = document.getElementById("error-body");
      const copyCodeButton = document.getElementById("copy-code");
      const shareUrlButton  = document.getElementById("share-url");
      const zoomButtons = [
        { btn: document.getElementById("zoom-100"), scale: 1    },
        { btn: document.getElementById("zoom-75"),  scale: 0.75 },
        { btn: document.getElementById("zoom-50"),  scale: 0.5  },
        { btn: document.getElementById("zoom-25"),  scale: 0.25 },
      ];

      function applyZoom(scale) {
        zoomButtons.forEach(({ btn, scale: s }) => btn.classList.toggle("zoom-active", s === scale));
        if (scale === 1) {
          iframe.style.transform = "";
          iframe.style.width = "";
          iframe.style.height = "";
        } else {
          const inv = (1 / scale * 100).toFixed(3) + "%";
          iframe.style.transform = `scale(${scale})`;
          iframe.style.width = inv;
          iframe.style.height = inv;
        }
      }

      zoomButtons.forEach(({ btn, scale }) => btn.addEventListener("click", () => applyZoom(scale)));

      let currentUrl = "";
      let currentCode = "";
      let loadTimer = null;

      function hideSpinner() {
        clearTimeout(loadTimer);
        loadTimer = null;
        loadingOverlay.classList.add("hidden");
        loadingOverlay.classList.remove("blocked");
        loadingOverlay.innerHTML =
          '<div class="spinner"></div><span>Loading visualization…</span>';
      }

      function showBlockedFallback() {
        loadingOverlay.classList.remove("hidden");
        loadingOverlay.classList.add("blocked");
        loadingOverlay.innerHTML =
          '<span style="font-size:0.85rem;opacity:0.8;text-align:center;max-width:34rem">Inline preview was blocked by the host app. Some MCP clients, including Claude Desktop, restrict iframe origins with Content Security Policy and will not embed <code>localhost</code> pages.</span>' +
          (currentUrl
            ? `<a href="${currentUrl}" target="_blank" rel="noopener" style="font-size:0.85rem;color:inherit;text-decoration:underline;text-underline-offset:2px">Open visualization in browser ↗</a>`
            : "");
      }

      // Hide spinner when iframe finishes loading
      iframe.addEventListener("load", () => {
        if (iframe.src && iframe.src !== "about:blank") {
          hideSpinner();
        }
      });

      // Fallback: if load never fires within 10s, assume the host blocked iframe
      // embedding (commonly due to CSP restrictions on localhost origins).
      function startLoadTimer() {
        clearTimeout(loadTimer);
        loadTimer = setTimeout(showBlockedFallback, 10_000);
      }

      async function copyToClipboard(text) {
        if (navigator.clipboard) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch (_) {
            // fall through to legacy path
          }
        }
        // Legacy fallback — works in VS Code webviews
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.cssText = "position:fixed;opacity:0;pointer-events:none";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      }

      function flashCopied(btn) {
        const original = btn.textContent;
        btn.textContent = "Copied ✓";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = original;
          btn.classList.remove("copied");
        }, 1500);
      }

      shareUrlButton.addEventListener("click", async () => {
        if (!currentUrl) return;
        const ok = await copyToClipboard(currentUrl);
        if (ok) flashCopied(shareUrlButton);
      });

      copyCodeButton.addEventListener("click", async () => {
        const ok = await copyToClipboard(currentCode || "No code available.");
        if (ok) flashCopied(copyCodeButton);
      });

      const app = new App({ name: "panel-live-server-show", version: "0.1.0" });

      app.ontoolresult = ({ content }) => {
        const textContent = content?.find((entry) => entry.type === "text");
        const rawText = textContent?.text ?? "No tool text payload received.";

        let parsedPayload = null;
        try {
          parsedPayload = JSON.parse(rawText);
        } catch {
          parsedPayload = null;
        }

        // Reset status classes
        messageEl.className = "message";

        if (parsedPayload && typeof parsedPayload === "object") {
          const status = parsedPayload.status || "success";
          const statusPrefix = status === "error" ? "✗ " : status === "warning" ? "⚠ " : "";
          const baseMessage = statusPrefix + (parsedPayload.message || "Tool result received.");
          const extraError = parsedPayload.error_message ? `\n\n${parsedPayload.error_message}` : "";
          const recovery = parsedPayload.recovery ? `\n\n${parsedPayload.recovery}` : "";

          messageEl.classList.add(`status-${status}`);
          currentUrl = typeof parsedPayload.url === "string" ? parsedPayload.url : "";
          currentCode = typeof parsedPayload.code === "string" ? parsedPayload.code : "";

          // Update tab title with visualization name if available
          if (parsedPayload.name) {
            document.title = `Panel Live Server · ${parsedPayload.name}`;
          }

          // Enable action buttons now that we have a result
          copyCodeButton.disabled = !currentCode;
          shareUrlButton.disabled = !currentUrl;

          // Apply zoom from payload
          const zoomVal = parsedPayload.zoom;
          if (zoomVal && zoomVal !== 100) {
            const scale = zoomVal / 100;
            const entry = zoomButtons.find(z => Math.abs(z.scale - scale) < 0.01);
            if (entry) applyZoom(entry.scale);
          }

          const fullText = `${baseMessage}${extraError}${recovery}`;
          // Show short label in toolbar; full detail on hover
          // Wrap in span so tinted background hugs the text, not the full flex width
          messageEl.innerHTML = `<span>${baseMessage}</span>`;
          messageEl.title = fullText;
        } else {
          messageEl.textContent = rawText;
          messageEl.title = rawText;
          const urlRegex = /(https?:\/\/[^\s)]+)/i;
          const match = rawText.match(urlRegex);
          currentUrl = match ? match[1] : "";
          currentCode = "";
        }

        // Load iframe or show error panel
        if (currentUrl) {
          errorPanel.classList.remove("visible");
          iframe.style.display = "";
          loadingOverlay.classList.remove("hidden", "blocked");
          loadingOverlay.innerHTML =
            '<div class="spinner"></div><span>Loading visualization…</span>';
          iframe.src = currentUrl;
          startLoadTimer();
        } else {
          hideSpinner();
          iframe.src = "about:blank";
          iframe.style.display = "none";

          // Determine error text from parsed payload or raw text
          const errorText = (parsedPayload && parsedPayload.status === "error")
            ? (parsedPayload.error_message || parsedPayload.message || rawText)
            : rawText;

          // Classify the error for the header
          const lower = errorText.toLowerCase();
          const headerText = lower.includes("security") || lower.includes("blocked")
            ? "✗ Security Error"
            : lower.includes("syntax")
              ? "✗ Syntax Error"
              : lower.includes("package")
                ? "✗ Package Error"
                : lower.includes("extension")
                  ? "✗ Extension Error"
                  : lower.includes("runtime")
                    ? "✗ Runtime Error"
                    : "✗ Validation Error";

          errorPanel.querySelector(".error-header").textContent = headerText;
          errorBody.textContent = errorText;
          errorPanel.classList.add("visible");
        }
      };

      await app.connect();
    </script>
  </body>
</html>
