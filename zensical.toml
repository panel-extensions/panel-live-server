[project]
site_name = "panel-live-server"
site_description = "Panel Live Server is a local Panel web server that executes Python code snippets and renders the resulting visualizations as live, interactive web pages — enabling AI assistants to display and inspect HoloViz outputs in real time."
site_author = "MarcSkovMadsen"
repo_url = "https://github.com/panel-extensions/panel-live-server"
repo_name = "panel-extensions/panel-live-server"
edit_uri = "edit/main/docs/"
nav = [
  {"Home" = "index.md"},
  {"Tutorials" = [
    {"Installation" = "tutorials/installation.md"},
    {"Standalone Server" = "tutorials/standalone-server.md"},
    {"MCP Server" = "tutorials/mcp-server.md"}
  ]},
  {"Examples" = [
    {"Github Copilot" = "examples/github-copilot.md"}
   ]},
  {"How-to Guides" = [
    {"Configure the Server" = "how-to/configure-server.md"}
  ]},
  {"Explanation" = [
    {"Architecture" = "explanation/architecture.md"}
  ]},
  {"Reference" = [
    {"API Reference" = "reference/panel_live_server.md"},
    {"Examples MCP" = "examples-mcp.md"}
  ]}
]

# Theme configuration
[project.theme]
logo = "assets/logo.svg"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow"
]

# Color palette - light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "blue"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

# Color palette - dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "blue"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

# Markdown extensions
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
url_download = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.superfences]

# Plugins
[project.plugins]
search = {}

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
show_if_no_docstring = true
filters = ["!^_"]

# Extra configuration
[project.extra]

